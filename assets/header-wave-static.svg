  <g transform="translate(849 72)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="100" cy="80" r="69" stroke="#8b7cff" stroke-opacity=".18"/>
    <circle cx="100" cy="80" r="42" stroke="#ff6f91" stroke-opacity=".2"/>
    <path d="M31 80H8M192 80h-23M100 11V-9M100 169v-20" stroke="#a99dfd" stroke-opacity=".42"/>
    <path d="M50 47 77 80l-27 33M150 47l-27 33 27 33" stroke="url(#accent)" stroke-width="7"/>
    <circle cx="100" cy="80" r="7" fill="#f7f4ff" stroke="none"/>
    <circle cx="100" cy="80" r="14" stroke="#f7f4ff" stroke-opacity=".17"/>
