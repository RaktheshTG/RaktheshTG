name: Update Profile Analytics

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-analytics
  cancel-in-progress: true

jobs:
  refresh-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate analytics artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: ${{ github.repository_owner }}
          PROFILE_REPO: ${{ github.event.repository.name }}
          MAX_REPOS: '12'
          ACTIVE_REPO_DAYS: '365'
        run: python3 scripts/generate_analytics.py

      - name: Commit updated analytics (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/analytics/*.svg assets/analytics/summary.md assets/analytics/data.json
          if git diff --cached --quiet; then
            echo "No analytics changes detected"
          else
            git commit -m "chore: refresh profile analytics"
            git push
          fi
