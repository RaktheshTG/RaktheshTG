<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="220" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">Terminal session</title>
  <desc id="desc">Animated terminal showing Rakthesh TG stack and focus areas, light theme.</desc>
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f1fa"/>
    </linearGradient>
    <clipPath id="typeClip">
      <rect x="24" y="78" width="672" height="120">
        <animate attributeName="width" values="0;0;672;672;672;0" keyTimes="0;0.08;0.55;0.88;0.95;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="720" height="220" rx="14" fill="url(#shell)" stroke="#d8d0ea" stroke-width="1.5"/>
  <rect width="720" height="34" rx="14" fill="#ece8f5"/>
  <rect y="20" width="720" height="14" fill="#ece8f5"/>

  <circle cx="22" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="17" r="6" fill="#febc2e"/>
  <circle cx="66" cy="17" r="6" fill="#28c840"/>
  <text x="360" y="21" fill="#8a829e" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle">rakthesh@dev ~ zsh</text>

  <g font-family="Consolas, monospace" font-size="14" line-height="1.5">
    <text x="24" y="62" fill="#2ea86a">$</text>
    <text x="42" y="62" fill="#3d3658">whoami</text>

    <g clip-path="url(#typeClip)">
      <text x="24" y="92" fill="#6a42cc">&#8594; Rakthesh TG</text>
      <text x="24" y="118" fill="#2ea86a">$</text>
      <text x="42" y="118" fill="#3d3658">cat focus.txt</text>
      <text x="24" y="144" fill="#5a5280">Full-stack &#183; Agentic AI &#183; RAG pipelines</text>
      <text x="24" y="170" fill="#2ea86a">$</text>
      <text x="42" y="170" fill="#3d3658">stack --brief</text>
      <text x="24" y="196" fill="#c43d6a">C &#183; C++ &#183; JS &#183; Python &#183; React &#183; LangGraph</text>
    </g>

    <!-- Cursor: blinking and synchronized with text animation -->
    <rect x="24" y="184" width="8" height="14" fill="#6a42cc" shape-rendering="crispEdges">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.49;0.5;1" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="x" values="24;24;322;322;24" keyTimes="0;0.08;0.55;0.88;1" dur="12s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>