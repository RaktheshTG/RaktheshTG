<svg width="100%" height="400" viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f3f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0f3f;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="pythonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E90FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#87CEEB;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="jsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cppGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF1744;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B9D;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="tsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3178C6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#61DAFB;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="sqlGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00A4A4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4D4;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glowDark">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="400" fill="url(#bgGradientDark)" rx="12"/>
  
  <!-- Title -->
  <text x="40" y="40" font-size="24" font-weight="bold" fill="#E0E7FF">📊 Language Distribution</text>
  
  <!-- Python Bar -->
  <rect x="40" y="80" width="280" height="50" fill="url(#pythonGrad)" rx="6" filter="url(#glowDark)" opacity="0.9"/>
  <text x="60" y="115" font-size="16" fill="#FFFFFF" font-weight="bold">Python</text>
  <text x="330" y="115" font-size="16" fill="#A78BFA" font-weight="bold">35%</text>
  
  <!-- JavaScript Bar -->
  <rect x="40" y="150" width="220" height="50" fill="url(#jsGrad)" rx="6" filter="url(#glowDark)" opacity="0.9"/>
  <text x="60" y="185" font-size="16" fill="#000000" font-weight="bold">JavaScript</text>
  <text x="270" y="185" font-size="16" fill="#A78BFA" font-weight="bold">28%</text>
  
  <!-- C++ Bar -->
  <rect x="40" y="220" width="140" height="50" fill="url(#cppGrad)" rx="6" filter="url(#glowDark)" opacity="0.9"/>
  <text x="60" y="255" font-size="16" fill="#FFFFFF" font-weight="bold">C++</text>
  <text x="190" y="255" font-size="16" fill="#A78BFA" font-weight="bold">18%</text>
  
  <!-- TypeScript Bar -->
  <rect x="40" y="290" width="100" height="50" fill="url(#tsGrad)" rx="6" filter="url(#glowDark)" opacity="0.9"/>
  <text x="60" y="325" font-size="16" fill="#FFFFFF" font-weight="bold">TypeScript</text>
  <text x="150" y="325" font-size="16" fill="#A78BFA" font-weight="bold">12%</text>
  
  <!-- Vertical divider -->
  <line x1="550" y1="30" x2="550" y2="380" stroke="#8B7CFF" stroke-width="2" opacity="0.3"/>
  
  <!-- Right side: Top Repositories -->
  <text x="600" y="40" font-size="24" font-weight="bold" fill="#E0E7FF">🔥 Top Repositories</text>
  
  <!-- PaperTrail -->
  <circle cx="630" cy="100" r="35" fill="url(#pythonGrad)" filter="url(#glowDark)"/>
  <text x="630" y="108" font-size="20" fill="#FFFFFF" font-weight="bold" text-anchor="middle">245</text>
  <text x="690" y="105" font-size="14" fill="#E0E7FF" font-weight="600">PaperTrail</text>
  <text x="690" y="125" font-size="12" fill="#A78BFA">TypeScript • React • Groq</text>
  
  <!-- CustomerSupportAI -->
  <circle cx="630" cy="180" r="30" fill="url(#jsGrad)" filter="url(#glowDark)"/>
  <text x="630" y="187" font-size="18" fill="#000000" font-weight="bold" text-anchor="middle">189</text>
  <text x="690" y="185" font-size="14" fill="#E0E7FF" font-weight="600">CustomerSupportAI</text>
  <text x="690" y="205" font-size="12" fill="#A78BFA">Python • LangGraph • RAG</text>
  
  <!-- UniFocus -->
  <circle cx="630" cy="260" r="28" fill="url(#cppGrad)" filter="url(#glowDark)"/>
  <text x="630" y="267" font-size="17" fill="#FFFFFF" font-weight="bold" text-anchor="middle">156</text>
  <text x="690" y="265" font-size="14" fill="#E0E7FF" font-weight="600">UniFocus</text>
  <text x="690" y="285" font-size="12" fill="#A78BFA">JavaScript • Express • MySQL</text>
  
  <!-- DSA Practice -->
  <circle cx="630" cy="335" r="25" fill="url(#tsGrad)" filter="url(#glowDark)"/>
  <text x="630" y="341" font-size="16" fill="#FFFFFF" font-weight="bold" text-anchor="middle">128</text>
  <text x="690" y="339" font-size="14" fill="#E0E7FF" font-weight="600">DSA Practice</text>
  <text x="690" y="359" font-size="12" fill="#A78BFA">C++ • Algorithms</text>
</svg>
