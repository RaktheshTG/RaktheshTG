<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="310" viewBox="0 0 1200 310" role="img" aria-labelledby="title desc">
  <title id="title">Rakthesh TG</title>
  <desc id="desc">Full-stack developer and agentic AI builder.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0b16"/>
      <stop offset=".55" stop-color="#151020"/>
      <stop offset="1" stop-color="#200f1b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b7cff"/>
      <stop offset="1" stop-color="#ff6f91"/>
    </linearGradient>
    <radialGradient id="purpleGlow">
      <stop offset="0" stop-color="#8b7cff" stop-opacity=".32"/>
      <stop offset="1" stop-color="#8b7cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pinkGlow">
      <stop offset="0" stop-color="#ff6f91" stop-opacity=".23"/>
      <stop offset="1" stop-color="#ff6f91" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity=".035"/>
    </pattern>
  </defs>

  <rect width="1200" height="310" rx="24" fill="url(#background)"/>
  <rect width="1200" height="310" rx="24" fill="url(#grid)"/>
  <circle cx="190" cy="35" r="260" fill="url(#purpleGlow)"/>
  <circle cx="1070" cy="260" r="280" fill="url(#pinkGlow)"/>

  <g transform="translate(72 67)">
    <rect width="158" height="28" rx="14" fill="#ffffff" fill-opacity=".055" stroke="#8b7cff" stroke-opacity=".48"/>
    <circle cx="17" cy="14" r="4" fill="#72e6a1"/>
    <text x="30" y="18" fill="#c7c0d8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" letter-spacing="1.25">OPEN TO BUILD</text>

    <text y="91" fill="#f7f4ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="58" font-weight="760" letter-spacing="-2">Rakthesh TG</text>
    <rect y="110" width="432" height="4" rx="2" fill="url(#accent)"/>
    <text y="151" fill="#b9b2ca" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">
