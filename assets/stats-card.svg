<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="240" viewBox="0 0 1000 240" role="img" aria-labelledby="title desc">
  <title id="title">GitHub activity for the last 12 months</title>
  <desc id="desc">63 contributions, 2 day current streak, 7 day longest streak, and 20 active days.</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11101a"/>
      <stop offset="0.52" stop-color="#181525"/>
      <stop offset="1" stop-color="#211522"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b7cff"/>
      <stop offset="1" stop-color="#ff6f91"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="1" y="1" width="998" height="238" rx="20" fill="url(#surface)" stroke="#302b43"/>
  <circle cx="914" cy="-8" r="130" fill="#ff6f91" opacity=".055"/>
  <circle cx="55" cy="265" r="160" fill="#8b7cff" opacity=".06"/>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="38" y="42" fill="#f4f1ff" font-size="18" font-weight="700">GITHUB ACTIVITY</text>
    <text x="38" y="64" fill="#928ca8" font-size="11" letter-spacing="1.8">LAST 12 MONTHS · SYNCED 2026-07-02</text>

    <g transform="translate(38 94)">
      <text y="36" fill="#ffffff" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="38" font-weight="700">63</text>
      <text y="60" fill="#aaa4bc" font-size="12">contributions</text>
    </g>

    <g transform="translate(265 94)">
      <text y="36" fill="#ffffff" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="38" font-weight="700">20</text>
      <text y="60" fill="#aaa4bc" font-size="12">active days</text>
    </g>

    <g transform="translate(470 94)">
      <text y="36" fill="#ffffff" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="38" font-weight="700">7</text>
      <text y="60" fill="#aaa4bc" font-size="12">longest streak</text>
    </g>

    <g transform="translate(742 19)">
      <circle cx="100" cy="100" r="64" fill="none" stroke="#302c3e" stroke-width="11"/>
      <circle cx="100" cy="100" r="64" fill="none" stroke="url(#accent)" stroke-width="11" stroke-linecap="round"
        stroke-dasharray="28.149 402.124" transform="rotate(-90 100 100)" filter="url(#glow)"/>
      <text x="100" y="98" fill="#ffffff" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="32" font-weight="700">2</text>
      <text x="100" y="120" fill="#aaa4bc" text-anchor="middle" font-size="11">CURRENT STREAK</text>
      <text x="100" y="137" fill="#777187" text-anchor="middle" font-size="10">7% OF 30 DAYS</text>
    </g>

    <rect x="38" y="201" width="634" height="3" rx="2" fill="#302c3e"/>
    <rect x="38" y="201" width="44.4" height="3" rx="2" fill="url(#accent)"/>
    <text x="38" y="222" fill="#777187" font-size="10">Generated directly from GitHub contribution data</text>
  </g>
</svg>
