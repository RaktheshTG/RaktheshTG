<?xml version="1.0" encoding="utf-8"?>
<svg id="stats" xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111219"/>
      <stop offset="1" stop-color="#22222A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#b067ff"/>
      <stop offset="100%" stop-color="#ff6ab9"/>
    </linearGradient>
    <filter id="cardGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="900" height="220" rx="12" fill="url(#bg)"/>

  <!-- left column: total contributions -->
  <g transform="translate(40,30)">
    <text x="0" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cfc9ff" opacity="0.9">Total contributions (last year)</text>
    <text x="0" y="68" font-family="Fira Code, monospace" font-size="36" fill="#ffffff" font-weight="700">1234</text>
  </g>

  <!-- center column: ring + current streak -->
  <g transform="translate(360,12)">
    <!-- ring background -->
    <circle cx="110" cy="110" r="90" fill="none" stroke="#2b2b34" stroke-width="18"/>

    <!-- animated progress ring (stroke-dasharray will be replaced) -->
    <!-- circumference = 2 * PI * 90 ≈ 565.4867 -->
    <circle id="progressRing" cx="110" cy="110" r="90" fill="none" stroke="url(#accent)" stroke-width="18" stroke-linecap="round" transform="rotate(-90 110 110)" stroke-dasharray="96.133 565.487" />

    <!-- flame icon -->
    <g transform="translate(70,70) scale(0.9)">
      <path d="M40 5 C30 20 28 30 34 38 C20 36 12 48 12 64 C12 92 48 105 66 92 C86 78 88 60 80 46 C90 54 102 52 110 38 C100 70 78 92 66 96 C44 104 12 100 12 64" fill="#ffb3e6" opacity="0.95"/>
    </g>

    <!-- streak numbers inside ring -->
    <text x="110" y="106" font-family="Inter, system-ui, sans-serif" font-size="20" text-anchor="middle" fill="#ffffff" font-weight="700">7</text>
    <text x="110" y="130" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#cfc9ff">current streak</text>
  </g>

  <!-- right column: longest streak -->
  <g transform="translate(660,30)">
    <text x="0" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cfc9ff" opacity="0.9">Longest streak (last year)</text>
    <text x="0" y="68" font-family="Fira Code, monospace" font-size="36" fill="#ffffff" font-weight="700">42</text>
  </g>

  <!-- credit / generated note -->
  <text x="20" y="204" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#999">Generated by scripts/generate-stats.js</text>
</svg>
