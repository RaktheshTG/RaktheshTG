<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="220" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">Terminal session</title>
  <desc id="desc">Animated terminal showing Rakthesh TG stack and focus areas, light theme.</desc>
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f1fa"/>
    </linearGradient>
  </defs>

  <rect width="720" height="220" rx="14" fill="url(#shell)" stroke="#d8d0ea" stroke-width="1.5"/>
  <rect width="720" height="34" rx="14" fill="#ece8f5"/>
  <rect y="20" width="720" height="14" fill="#ece8f5"/>

  <circle cx="22" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="17" r="6" fill="#febc2e"/>
  <circle cx="66" cy="17" r="6" fill="#28c840"/>
  <text x="360" y="21" fill="#8a829e" font-family="Segoe UI, Arial, sans-serif" font-size="11" text-anchor="middle">rakthesh@dev ~ zsh</text>

  <g font-family="Consolas, monospace" font-size="14">
    <!-- Static prompt -->
    <text x="24" y="62" fill="#2ea86a">$</text>
    <text x="42" y="62" fill="#3d3658">whoami</text>

    <!-- Line 1: Arrow + Name (chars 0-16, duration 0-1.6s) -->
    <text x="24" y="92" fill="#6a42cc">
      <tspan id="line1">&#8594; Rakthesh TG</tspan>
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.08;0.1;0.14;1" dur="12s" repeatCount="indefinite"/>
    </text>

    <!-- Line 2: Prompt -->
    <text x="24" y="118" fill="#2ea86a">
      <tspan id="line2">$</tspan>
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.14;0.16;0.2;1" dur="12s" repeatCount="indefinite"/>
    </text>

    <!-- Line 2: Command (chars 0-13, duration 1.6-3.0s) -->
    <text x="42" y="118" fill="#3d3658">
      <tspan id="line2b">cat focus.txt</tspan>
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.16;0.18;0.26;1" dur="12s" repeatCount="indefinite"/>
    </text>

    <!-- Line 3: Output -->
    <text x="24" y="144" fill="#5a5280">
      <tspan id="line3">Full-stack &#183; Agentic AI &#183; RAG pipelines</tspan>
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.26;0.28;0.36;1" dur="12s" repeatCount="indefinite"/>
    </text>

    <!-- Line 4: Prompt -->
    <text x="24" y="170" fill="#2ea86a">
      <tspan id="line4">$</tspan>
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.36;0.38;0.42;1" dur="12s" repeatCount="indefinite"/>
    </text>

    <!-- Line 4: Command (chars 0-15, duration 3.8-5.2s) -->
    <text x="42" y="170" fill="#3d3658">
      <tspan id="line4b">stack --brief</tspan>
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.38;0.4;0.52;1" dur="12s" repeatCount="indefinite"/>
    </text>

    <!-- Line 5: Output -->
    <text x="24" y="196" fill="#c43d6a">
      <tspan id="line5">C &#183; C++ &#183; JS &#183; Python &#183; React &#183; LangGraph</tspan>
      <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.52;0.54;0.68;1" dur="12s" repeatCount="indefinite"/>
    </text>

    <!-- Cursor: positioned and animated to follow typing -->
    <g>
      <!-- Blink animation -->
      <rect x="32" y="184" width="8" height="14" fill="#6a42cc" shape-rendering="crispEdges">
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.49;0.5;1" dur="0.8s" repeatCount="indefinite"/>
        <!-- Line 1 cursor: moves from after arrow to end of "Rakthesh TG" (0-13 chars × 8px) -->
        <animate attributeName="x" 
          values="32;32;270;270;270;270;32;32" 
          keyTimes="0;0.08;0.1;0.14;0.26;0.36;0.88;1" 
          dur="12s" 
          repeatCount="indefinite"
          calcMode="linear"/>
      </rect>
    </g>
  </g>
</svg>