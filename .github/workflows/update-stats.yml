name: Update GitHub Stats SVG

on:
  schedule:
    - cron: '35 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-stats
  cancel-in-progress: true

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test stats generator
        run: npm test

      - name: Run stats generator
        env:
          GITHUB_TOKEN: ${{ secrets.REWRITE_TOKEN}}
          GITHUB_USER: ${{ github.repository_owner }}
        run: npm run generate

      - name: Commit generated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats-card.svg assets/stats-card-light.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh profile stats"
            git push
          fi
