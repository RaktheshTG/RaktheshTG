name: Real-Time Language & Contribution Analytics

on:
  schedule:
    - cron: '30 21 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  generate-analytics:
    runs-on: ubuntu-latest
    name: Generate and Update Analytics
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install octokit

      - name: Generate Analytics Data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          cat > generate_analytics.js << 'EOF'
          const { Octokit } = require("octokit");
          const fs = require("fs");
          const path = require("path");
          
          const octokit = new Octokit({
            auth: process.env.GITHUB_TOKEN,
          });

          async function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
          }

          async function getAllRepos(octokit, owner) {
            let allRepos = [];
            let page = 1;
            
            while (true) {
              const response = await octokit.rest.repos.listForUser({
                username: owner,
                sort: "updated",
                direction: "desc",
                per_page: 100,
                type: "public",
                fork: false,
                page: page,
              });
              
              allRepos = allRepos.concat(response.data);
              
              if (response.data.length < 100) break;
              page++;
              
              await sleep(500);
            }
            
            return allRepos.filter(repo => !repo.archived);
          }

          async function generateAnalytics() {
            try {
              console.log("🚀 Starting analytics generation...");
              
              const owner = process.env.REPO_OWNER;

              const userResponse = await octokit.rest.users.getByUsername({
                username: owner,
              });
              console.log(`✅ Retrieved profile for ${owner}`);

              const repos = await getAllRepos(octokit, owner);
              console.log(`✅ Retrieved ${repos.length} public repositories (non-fork, non-archived)`);

              const languageStats = {};
              let totalBytes = 0;

              for (const repo of repos) {
                try {
                  await sleep(200);
                  
                  const langResponse = await octokit.rest.repos.listLanguages({
                    owner: repo.owner.login,
                    repo: repo.name,
                  });

                  for (const [lang, bytes] of Object.entries(langResponse.data)) {
                    languageStats[lang] = (languageStats[lang] || 0) + bytes;
                    totalBytes += bytes;
                  }
                } catch (err) {
                  console.warn(`⚠️  Could not fetch languages for ${repo.name}`);
                }
              }

              const languagePercentages = {};
              for (const [lang, bytes] of Object.entries(languageStats)) {
                languagePercentages[lang] = totalBytes > 0 
                  ? ((bytes / totalBytes) * 100).toFixed(1) 
                  : "0.0";
              }

              const sortedLanguages = Object.entries(languagePercentages)
                .sort(([, a], [, b]) => b - a)
                .slice(0, 10);

              console.log("📊 Language Distribution:");
              sortedLanguages.forEach(([lang, pct]) => {
                console.log(`   ${lang}: ${pct}%`);
              });

              let totalCommits = 0;
              try {
                const oneYearAgo = new Date(Date.now() - 365 * 24 * 60 * 60 * 1000)
                  .toISOString().split('T')[0];
                  
                const commitsResponse = await octokit.rest.search.commits({
                  q: `author:${owner} author-date:>=${oneYearAgo}`,
                  per_page: 1,
                });
                totalCommits = commitsResponse.data.total_count;
                console.log(`✅ Total commits (last year): ${totalCommits}`);
              } catch (err) {
                console.warn("⚠️  Could not fetch commit statistics:", err.message);
                totalCommits = 0;
              }

              const analytics = {
                timestamp: new Date().toISOString(),
                profile: {
                  name: userResponse.data.name || owner,
                  login: userResponse.data.login,
                  followers: userResponse.data.followers,
                  public_repos: userResponse.data.public_repos,
                  profile_url: userResponse.data.html_url,
                },
                statistics: {
                  total_repositories: repos.length,
                  total_commits_year: totalCommits,
                  total_followers: userResponse.data.followers,
                  public_projects: repos.length,
                  total_stars: repos.reduce((sum, r) => sum + r.stargazers_count, 0),
                  total_forks: repos.reduce((sum, r) => sum + r.forks_count, 0),
                },
                languages: Object.fromEntries(sortedLanguages),
                top_repositories: repos.slice(0, 5).map((repo) => ({
                  name: repo.name,
                  url: repo.html_url,
                  stars: repo.stargazers_count,
                  forks: repo.forks_count,
                  description: repo.description,
                })),
              };

              const analyticsPath = path.join(process.cwd(), "ANALYTICS.json");
              fs.writeFileSync(analyticsPath, JSON.stringify(analytics, null, 2));
              console.log(`✅ Analytics saved to ${analyticsPath}`);
              console.log("✅ Analytics generation complete!");
              process.exit(0);
            } catch (error) {
              console.error("❌ Error generating analytics:", error.message);
              process.exit(1);
            }
          }

          generateAnalytics();
          EOF
          
          node generate_analytics.js

      - name: Commit and Push Changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          if [ -f "ANALYTICS.json" ]; then
            git add ANALYTICS.json
            
            if ! git diff --cached --quiet; then
              git commit -m "chore: update analytics data [automated]"
              git push origin main || {
                git pull origin main --rebase
                git push origin main
              }
              echo "✅ Changes pushed successfully"
            else
              echo "ℹ️  No new changes detected. Skipping commit."
            fi
          else
            echo "⚠️  ANALYTICS.json not found. Skipping push."
          fi

      - name: Cleanup
        if: always()
        run: rm -f generate_analytics.js
