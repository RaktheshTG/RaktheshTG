<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
  <title id="title">Rakthesh TG</title>
  <desc id="desc">Full-stack developer and agentic AI builder  dark theme banner.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0812"/>
      <stop offset=".5" stop-color="#120e1c"/>
      <stop offset="1" stop-color="#1a0f18"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6a42cc"/>
      <stop offset=".5" stop-color="#8b7cff"/>
      <stop offset="1" stop-color="#ff6f91"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b8a6ff"/>
      <stop offset="1" stop-color="#ff9ab5"/>
    </linearGradient>
    <radialGradient id="glow1"><stop offset="0" stop-color="#8b7cff" stop-opacity=".28"/><stop offset="1" stop-color="#8b7cff" stop-opacity="0"/></radialGradient>
    <radialGradient id="glow2"><stop offset="0" stop-color="#ff6f91" stop-opacity=".2"/><stop offset="1" stop-color="#ff6f91" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#fff" stroke-opacity=".04"/>
    </pattern>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="340" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="340" rx="24" fill="url(#grid)"/>
  <circle cx="160" cy="40" r="240" fill="url(#glow1)"/>
  <circle cx="1060" cy="300" r="260" fill="url(#glow2)"/>

  <!-- animated wave -->
  <path fill="url(#wave)" opacity=".22" filter="url(#softGlow)">
    <animate attributeName="d" dur="9s" repeatCount="indefinite"
      values="M0,250 C200,290 380,180 600,230 C820,280 980,170 1200,220 L1200,340 L0,340 Z;
              M0,240 C220,200 360,280 600,210 C840,140 960,260 1200,200 L1200,340 L0,340 Z;
              M0,255 C180,300 400,190 600,245 C800,300 1000,185 1200,235 L1200,340 L0,340 Z;
              M0,250 C200,290 380,180 600,230 C820,280 980,170 1200,220 L1200,340 L0,340 Z"/>
  </path>

  <!-- flickering stars -->
  <g fill="#fff">
    <circle cx="920" cy="58" r="2.5" opacity=".9"><animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="92" r="1.8" opacity=".7"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3;0.35;0.8;1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="48" r="2" opacity=".8"><animate attributeName="opacity" values="1;0;1;0;1" keyTimes="0;0.25;0.5;0.75;1" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="870" cy="110" r="1.5" opacity=".6"><animate attributeName="opacity" values="0;1;0;1;0" keyTimes="0;0.2;0.4;0.6;1" dur="2.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- flickering lightning -->
  <g transform="translate(1010 130)" filter="url(#softGlow)">
    <path d="M18 0 L8 22 H16 L10 44 L30 18 H20 Z" fill="#ffd84d" stroke="#ffb800" stroke-width="1">
      <animate attributeName="opacity" values="1;1;0;0;1;1;0;0;1" keyTimes="0;0.12;0.13;0.25;0.26;0.62;0.63;0.75;1" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- pulsing status badge -->
  <g transform="translate(72 52)">
    <rect width="168" height="30" rx="15" fill="#fff" fill-opacity=".06" stroke="#8b7cff" stroke-opacity=".45"/>
    <circle cx="18" cy="15" r="5" fill="#72e6a1">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="32" y="19" fill="#d4cde8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" letter-spacing="1.3">OPEN TO BUILD</text>
  </g>

  <!-- title -->
  <text x="72" y="158" fill="url(#titleGrad)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="62" font-weight="760" letter-spacing="-2">Rakthesh TG</text>
  <rect x="72" y="172" width="460" height="4" rx="2" fill="url(#wave)">
    <animate attributeName="width" values="460;520;460" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text x="72" y="212" fill="#c4bdd8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">Full-stack developer · Agentic AI builder</text>
  <text x="72" y="244" fill="#7a738f" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="13">ideas ’ systems ’ useful experiences</text>

  <!-- orbiting code brackets -->
  <g transform="translate(880 175)" fill="none" stroke-linecap="round">
    <circle cx="70" cy="70" r="58" stroke="#8b7cff" stroke-opacity=".16" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0 70 70" to="360 70 70" dur="18s" repeatCount="indefinite"/>
    </circle>
    <path d="M38 52 L18 70 L38 88" stroke="#8b7cff" stroke-width="5" stroke-opacity=".75"/>
    <path d="M102 52 L122 70 L102 88" stroke="#ff6f91" stroke-width="5" stroke-opacity=".75"/>
    <circle cx="70" cy="70" r="6" fill="#f7f4ff"/>
  </g>

  <!-- flickering rocket -->
  <g transform="translate(1120 248)">
    <text font-size="22" opacity="1">
      =€
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.48;0.5;0.98;1" dur="2.5s" repeatCount="indefinite"/>
    </text>
  </g>

  <rect y="336" width="1200" height="4" rx="2" fill="url(#wave)"/>
</svg>
